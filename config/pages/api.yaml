id: api
title: API
template: modules
content:
  heading: Module API
  description: Two import paths. Each handles one half of the audio pipeline.
  modules:
    - path: dispipe/client
      title: Client & Voice Join
      summary: discord.js v14 client wrapper. Voice channel join with retry/backoff and inbound speaker subscription.
      functions:
        - sig: createClient()
          desc: Instantiate a configured discord.js Client with Guilds + GuildVoiceStates intents.
        - sig: joinDiscordVoice(client, guildId, channelId)
          desc: Join voice channel. 8-attempt retry loop with code-aware backoff (4017 → 10s, 4006 → 8s, else 4s).
        - sig: subscribeToSpeaker(userId, onPcmChunk)
          desc: Subscribe to a user's inbound Opus stream. Decodes to Float32 48kHz stereo and invokes callback.
        - sig: leaveVoice()
          desc: Tear down voice connection and clean up subscriptions.
    - path: dispipe/voice
      title: Outbound Audio Player
      summary: AudioPlayer pipeline. Float32 PCM → s16le → Opus encode → Discord voice connection.
      functions:
        - sig: initVoicePlayer(connection)
          desc: Wire a voice connection to the AudioPlayer. Sets up the encoder pipeline.
        - sig: pushAudioFrame(f32Buffer)
          desc: Enqueue a Float32 PCM frame at 48kHz stereo. Frames must be 960 samples (20ms).
        - sig: stopAudio()
          desc: Stop playback, drain encoder, release streams.
